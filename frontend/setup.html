<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI IMBot - 安装引导</title>
    <link rel="icon" type="image/x-icon" href="./public/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; background: #fff; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
        
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px 30px; display: flex; align-items: center; gap: 15px; }
        .chat-header .logo { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .chat-header h1 { font-size: 18px; font-weight: 600; }
        
        .chat-body { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        .message { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot-message { justify-content: flex-start; }
        .user-message { justify-content: flex-end; }
        
        .avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
        .bot-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .user-avatar { background: #e2e8f0; color: #64748b; }
        
        .message-content { max-width: 70%; padding: 15px 20px; border-radius: 16px; line-height: 1.6; }
        .bot-content { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
        .user-content { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-bottom-right-radius: 4px; }
        
        .quick-replies { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .quick-btn { padding: 10px 20px; background: #fff; border: 2px solid #e2e8f0; border-radius: 25px; cursor: pointer; font-size: 14px; transition: all 0.3s; color: #475569; }
        .quick-btn:hover { border-color: #667eea; color: #667eea; background: #f8fafc; }
        .quick-btn.selected { border-color: #667eea; background: #eff6ff; color: #667eea; }
        
        .chat-footer { padding: 20px 30px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .input-area { display: flex; gap: 12px; align-items: flex-end; }
        .input-area textarea { flex: 1; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; resize: none; font-size: 14px; min-height: 48px; max-height: 120px; }
        .input-area textarea:focus { outline: none; border-color: #667eea; }
        
        .step-indicator { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #e2e8f0; transition: all 0.3s; }
        .step-dot.active { background: #667eea; }
        .step-dot.completed { background: #10b981; }
        
        .progress-bar { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; margin-top: 15px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); border-radius: 2px; transition: width 0.3s ease; }
        
        .plugin-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }
        .plugin-info { display: flex; align-items: center; gap: 15px; }
        .plugin-icon { width: 48px; height: 48px; background: #eff6ff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .plugin-details h4 { font-size: 15px; color: #1e293b; margin-bottom: 4px; }
        .plugin-details p { font-size: 13px; color: #64748b; }
        
        .finish-screen { text-align: center; padding: 60px 30px; }
        .finish-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 40px; }
        .finish-screen h2 { font-size: 28px; color: #1e293b; margin-bottom: 15px; }
        .finish-screen p { font-size: 16px; color: #64748b; margin-bottom: 30px; }
        
        @media (max-width: 768px) {
            .chat-container { width: 100%; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div id="app" class="chat-container">
        <div class="chat-header">
            <div class="logo">🤖</div>
            <div>
                <h1>AI IMBot 智能助手</h1>
                <p style="font-size: 12px; opacity: 0.8;">正在为您配置专属解决方案...</p>
            </div>
        </div>

        <div class="chat-body" ref="chatBody">
            <div class="step-indicator">
                <div class="step-dot" :class="{ completed: currentStep > 1, active: currentStep === 1 }"></div>
                <div class="step-dot" :class="{ completed: currentStep > 2, active: currentStep === 2 }"></div>
                <div class="step-dot" :class="{ completed: currentStep > 3, active: currentStep === 3 }"></div>
                <div class="step-dot" :class="{ completed: currentStep > 4, active: currentStep === 4 }"></div>
            </div>

            <div v-for="(msg, index) in messages" :key="index" class="message" :class="msg.type === 'bot' ? 'bot-message' : 'user-message'">
                <div class="avatar" :class="msg.type === 'bot' ? 'bot-avatar' : 'user-avatar'">
                    {{ msg.type === 'bot' ? '🤖' : '👤' }}
                </div>
                <div class="message-content" :class="msg.type === 'bot' ? 'bot-content' : 'user-content'">
                    <div v-html="msg.content"></div>
                    
                    <div v-if="msg.type === 'bot' && msg.quickReplies" class="quick-replies">
                        <button 
                            v-for="reply in msg.quickReplies" 
                            :key="reply.value"
                            class="quick-btn"
                            :class="{ selected: selectedIndustry === reply.value }"
                            @click="handleQuickReply(reply)"
                        >
                            {{ reply.label }}
                        </button>
                    </div>
                    
                    <div v-if="msg.type === 'bot' && msg.plugins" style="margin-top: 15px;">
                        <p style="font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #475569;">推荐安装以下插件：</p>
                        <div v-for="plugin in msg.plugins" :key="plugin.id" class="plugin-card">
                            <div class="plugin-info">
                                <div class="plugin-icon">{{ plugin.icon }}</div>
                                <div class="plugin-details">
                                    <h4>{{ plugin.name }}</h4>
                                    <p>{{ plugin.description }}</p>
                                </div>
                            </div>
                            <el-checkbox v-model="selectedPlugins[plugin.id]" :disabled="plugin.required"></el-checkbox>
                        </div>
                    </div>
                    
                    <div v-if="msg.type === 'bot' && msg.showProgress" class="progress-bar">
                        <div class="progress-fill" :style="{ width: progress + '%' }"></div>
                    </div>
                </div>
            </div>

            <div v-if="showFinish" class="finish-screen">
                <div class="finish-icon">✅</div>
                <h2>配置完成！</h2>
                <p>已为您的{{ selectedIndustry }}行业配置专属功能模块</p>
                <el-button type="primary" size="large" @click="completeSetup">
                    开始使用 →
                </el-button>
            </div>
        </div>

        <div v-if="!showFinish" class="chat-footer">
            <div class="input-area">
                <textarea 
                    v-model="inputMessage" 
                    placeholder="请输入您的需求..." 
                    rows="1"
                    @keydown.enter.exact.prevent="sendMessage"
                ></textarea>
                <el-button type="primary" @click="sendMessage" :disabled="!inputMessage.trim()">
                    <el-icon><Send /></el-icon>
                </el-button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, nextTick, onMounted } = Vue;
        const { ElMessage, ElCheckbox } = ElementPlus;
        const { Send } = ElementPlusIconsVue;

        const API_BASE = '/api';

        const industries = ref([]);
        const pluginDetails = ref({});
        const industriesLoaded = ref(false);

        // 从 API 获取行业和插件数据
        const fetchIndustries = async () => {
            try {
                const res = await apiFetch('/setup/industries');
                const result = await res.json();
                if (result.success && result.industries.length > 0) {
                    const mappedIndustries = result.industries.map(ind => ({
                        label: ind.name,
                        value: ind.code,
                        icon: ind.icon,
                        description: ind.description,
                        plugins: ind.plugins
                    }));
                    industries.value = mappedIndustries;

                    const details = {};
                    result.industries.forEach(ind => {
                        (ind.plugin_details || []).forEach(pd => {
                            if (!details[pd.code]) {
                                details[pd.code] = {
                                    id: pd.code,
                                    name: pd.name,
                                    icon: pd.icon,
                                    description: ind.description,
                                    required: true
                                };
                            }
                        });
                    });
                    // 确保核心插件存在
                    if (!details['core']) {
                        details['core'] = {
                            id: 'core',
                            name: '核心功能插件',
                            icon: '⚙️',
                            description: '订单解析、消息捕获、规则引擎、报表生成',
                            required: true
                        };
                    }
                    pluginDetails.value = details;
                    industriesLoaded.value = true;
                    return true;
                }
            } catch (e) {
                console.warn('获取行业列表失败，使用默认数据:', e);
            }
            return false;
        };

        createApp({
            setup() {
                const messages = ref([]);
                const inputMessage = ref('');
                const currentStep = ref(1);
                const selectedIndustry = ref('');
                const selectedPlugins = reactive({});
                const showFinish = ref(false);
                const progress = ref(0);
                const chatBody = ref(null);

                const addMessage = (type, content, options = {}) => {
                    messages.value.push({ type, content, ...options });
                    nextTick(() => {
                        if (chatBody.value) {
                            chatBody.value.scrollTop = chatBody.value.scrollHeight;
                        }
                    });
                };

                const apiFetch = async (url, options = {}) => {
                    const token = localStorage.getItem('token');
                    const headers = {
                        'Content-Type': 'application/json',
                        ...options.headers
                    };
                    if (token) {
                        headers['Authorization'] = `Bearer ${token}`;
                    }
                    return fetch(`${API_BASE}${url}`, { ...options, headers });
                };

                const handleQuickReply = (reply) => {
                    inputMessage.value = reply.label;
                    selectedIndustry.value = reply.value;
                    sendMessage();
                };

                const sendMessage = () => {
                    if (!inputMessage.value.trim()) return;

                    addMessage('user', inputMessage.value);
                    const userInput = inputMessage.value;
                    inputMessage.value = '';

                    if (currentStep.value === 1) {
                        handleStep1(userInput);
                    } else if (currentStep.value === 2) {
                        handleStep2(userInput);
                    } else if (currentStep.value === 3) {
                        handleStep3(userInput);
                    }
                };

                const handleStep1 = async (input) => {
                    const inds = industries.value;
                    const details = pluginDetails.value;
                    const industry = inds.find(i => i.label.includes(input) || input.includes(i.label));
                    
                    if (industry) {
                        selectedIndustry.value = industry.value;
                        currentStep.value = 2;
                        
                        try {
                            const res = await apiFetch('/setup/select-industry', {
                                method: 'POST',
                                body: JSON.stringify({ industry: industry.value })
                            });
                            const result = await res.json();
                            
                            if (!result.success) {
                                ElMessage.error(result.error || '保存行业信息失败');
                            }
                        } catch (e) {
                            console.error('保存行业失败:', e);
                        }
                        
                        setTimeout(() => {
                            addMessage('bot', 
                                `太好了！您选择了 <strong>${industry.label}</strong> 行业。<br><br>${industry.description}`,
                                {
                                    plugins: [details['core'], ...industry.plugins.map(p => details[p])]
                                }
                            );
                            
                            industry.plugins.forEach(p => {
                                selectedPlugins[p] = true;
                            });
                            selectedPlugins['core'] = true;
                        }, 500);
                    } else {
                        setTimeout(() => {
                            addMessage('bot', 
                                '抱歉，我没完全理解。请从以下选项中选择您的行业：',
                                {
                                    quickReplies: inds
                                }
                            );
                        }, 500);
                    }
                };

                const handleStep2 = (input) => {
                    if (input.includes('确认') || input.includes('是') || input.includes('好')) {
                        currentStep.value = 3;
                        
                        setTimeout(() => {
                            addMessage('bot', 
                                '正在为您配置专属插件，请稍候...',
                                { showProgress: true }
                            );
                            
                            installPlugins();
                        }, 500);
                    } else {
                        setTimeout(() => {
                            addMessage('bot', '请确认是否安装以上插件（输入"确认"或"好"继续）');
                        }, 500);
                    }
                };

                const installPlugins = async () => {
                    const pluginIds = Object.keys(selectedPlugins).filter(k => selectedPlugins[k]);
                    const steps = pluginIds.length + 2;
                    let current = 0;
                    
                    try {
                        const res = await apiFetch('/setup/install-plugins', {
                            method: 'POST',
                            body: JSON.stringify({ plugin_ids: pluginIds })
                        });
                        const result = await res.json();
                        
                        const interval = setInterval(() => {
                            current++;
                            progress.value = (current / steps) * 100;
                            
                            if (current >= steps) {
                                clearInterval(interval);
                                currentStep.value = 4;
                                
                                setTimeout(() => {
                                    showFinish.value = true;
                                }, 500);
                            }
                        }, 300);
                        
                        if (!result.success) {
                            ElMessage.warning('部分插件安装失败，但不影响使用');
                        }
                    } catch (e) {
                        console.error('安装插件失败:', e);
                        currentStep.value = 4;
                        setTimeout(() => {
                            showFinish.value = true;
                        }, 500);
                    }
                };

                const handleStep3 = (input) => {
                    currentStep.value = 4;
                    setTimeout(() => {
                        showFinish.value = true;
                    }, 500);
                };

                const completeSetup = async () => {
                    try {
                        const res = await apiFetch('/setup/complete', {
                            method: 'POST'
                        });
                        const result = await res.json();
                        
                        if (result.success) {
                            localStorage.setItem('selectedIndustry', selectedIndustry.value);
                            localStorage.setItem('selectedPlugins', JSON.stringify(selectedPlugins));
                            localStorage.setItem('setupCompleted', 'true');
                        }
                    } catch (e) {
                        console.error('标记完成失败:', e);
                        localStorage.setItem('selectedIndustry', selectedIndustry.value);
                        localStorage.setItem('setupCompleted', 'true');
                    }
                    
                    window.location.href = 'index.html';
                };

                onMounted(async () => {
                    // 先尝试从 API 获取行业数据
                    const apiOk = await fetchIndustries();
                    if (!apiOk) {
                        // API 不可用时使用默认数据
                        industries.value = [
                            { label: '海鲜批发', value: 'seafood', icon: '🦐', description: '客户订单管理、急单处理、截单提醒', plugins: ['seafood'] },
                            { label: '餐饮配送', value: 'fooddelivery', icon: '🍽️', description: '商品管理、订单处理、促销活动', plugins: ['fooddelivery'] },
                            { label: '教育培训', value: 'education', icon: '📚', description: '课程管理、学员管理、学习进度', plugins: ['education'] },
                            { label: '房产中介', value: 'realestate', icon: '🏠', description: '房源管理、客户管理、智能匹配', plugins: ['realestate'] },
                            { label: '旅行社', value: 'travel', icon: '✈️', description: '线路管理、群配置、报名处理', plugins: ['travel'] },
                            { label: '工地管理', value: 'construction', icon: '🏗️', description: '工人打卡、工期管理、安全检查', plugins: ['construction'] },
                        ];
                        pluginDetails.value = {
                            seafood: { id: 'seafood', name: '海鲜批发插件', icon: '🦐', description: '客户订单管理、急单处理、截单提醒、报表统计', required: true },
                            fooddelivery: { id: 'fooddelivery', name: '餐饮配送插件', icon: '🍽️', description: '商品管理、订单处理、桌台管理、促销活动', required: true },
                            education: { id: 'education', name: '教育培训插件', icon: '📚', description: '课程管理、学员管理、教师管理、学习进度', required: true },
                            realestate: { id: 'realestate', name: '房产中介插件', icon: '🏠', description: '房源管理、客户管理、智能匹配、交易管理', required: true },
                            travel: { id: 'travel', name: '旅行社插件', icon: '✈️', description: '线路管理、群配置、报名处理、自动回复', required: true },
                            construction: { id: 'construction', name: '工地管理插件', icon: '🏗️', description: '工人打卡、工期管理、安全检查、材料管理', required: true },
                            core: { id: 'core', name: '核心功能插件', icon: '⚙️', description: '订单解析、消息捕获、规则引擎、报表生成', required: true },
                        };
                        industriesLoaded.value = true;
                    }
                    setTimeout(() => {
                        addMessage('bot',
                            '您好！欢迎使用 AI IMBot 智能桌面机器人工具。<br><br>为了给您提供更好的服务，请告诉我您所在的行业：',
                            {
                                quickReplies: industries.value
                            }
                        );
                    }, 500);
                });

                return {
                    messages,
                    inputMessage,
                    currentStep,
                    selectedIndustry,
                    selectedPlugins,
                    showFinish,
                    progress,
                    chatBody,
                    sendMessage,
                    handleQuickReply,
                    completeSetup
                };
            }
        })
        .use(ElementPlus)
        .component('Send', Send)
        .mount('#app');
    </script>
</body>
</html>
