<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/image/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="本地化配送服务商智能订货统计工具" />
    <meta name="theme-color" content="#409eff" />
    <title>TonjClaw - 智能订货管理</title>

    <!-- 预加载关键资源 -->
    <link rel="preload" href="/src/style.css" as="style" />
    <link rel="modulepreload" href="/src/main.js" />

    <!-- DNS预解析 -->
    <link rel="dns-prefetch" href="//localhost:5000" />
  </head>
  <body>
    <div id="app">
      <!-- 首屏加载占位 -->
      <div id="loading-placeholder" style="display:flex;align-items:center;justify-content:center;height:100vh;color:#909399;font-size:14px;">
        <span>加载中...</span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // 移除加载占位（Vue挂载后自动替换）
      window.addEventListener('load', () => {
        const placeholder = document.getElementById('loading-placeholder')
        if (placeholder) setTimeout(() => placeholder?.remove(), 1000)
      })
    </script>
  </body>
</html>
